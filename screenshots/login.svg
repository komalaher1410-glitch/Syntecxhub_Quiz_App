<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <defs>
    <radialGradient id="bg1" cx="20%" cy="20%" r="60%"><stop offset="0%" stop-color="#1a1708" stop-opacity="1"/><stop offset="100%" stop-color="#0d0d0f" stop-opacity="1"/></radialGradient>
    <radialGradient id="bg2" cx="80%" cy="80%" r="60%"><stop offset="0%" stop-color="#120d0d" stop-opacity="1"/><stop offset="100%" stop-color="#0d0d0f" stop-opacity="0"/></radialGradient>
  </defs>
  <!-- Background -->
  <rect width="680" height="520" fill="#0d0d0f"/>
  <rect width="680" height="520" fill="url(#bg1)" opacity="0.4"/>
  <rect width="680" height="520" fill="url(#bg2)" opacity="0.3"/>

  <!-- Header -->
  <circle cx="40" cy="36" r="5" fill="#f0c040"/>
  <text x="54" y="43" font-family="Georgia,serif" font-size="22" font-weight="900" fill="#f0eff4">QuizMaster</text>

  <!-- Card -->
  <rect x="140" y="68" width="400" height="420" rx="18" fill="#1c1c22" stroke="#2a2a32" stroke-width="1"/>
  <!-- Top accent bar -->
  <defs>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#e05a5a"/>
    </linearGradient>
  </defs>
  <rect x="140" y="68" width="400" height="3" rx="2" fill="url(#bar)"/>

  <!-- Brain icon box -->
  <rect x="311" y="90" width="58" height="58" rx="14" fill="rgba(240,192,64,0.1)" stroke="rgba(240,192,64,0.25)" stroke-width="1.5"/>
  <text x="340" y="129" font-size="26" text-anchor="middle" fill="#f0c040">🧠</text>

  <!-- Title -->
  <text x="340" y="172" font-family="Georgia,serif" font-size="22" font-weight="900" fill="#f0eff4" text-anchor="middle">Welcome Back</text>
  <text x="340" y="192" font-family="Arial,sans-serif" font-size="12" fill="#7f7f9a" text-anchor="middle">Sign in to start the quiz.</text>

  <!-- Tabs -->
  <rect x="160" y="208" width="360" height="36" rx="10" fill="#16161a" stroke="#2a2a32" stroke-width="1"/>
  <rect x="164" y="212" width="174" height="28" rx="8" fill="#1c1c22"/>
  <text x="251" y="231" font-family="Arial,sans-serif" font-size="12" font-weight="600" fill="#f0eff4" text-anchor="middle">Sign In</text>
  <text x="431" y="231" font-family="Arial,sans-serif" font-size="12" fill="#7f7f9a" text-anchor="middle">Create Account</text>

  <!-- Username label -->
  <text x="164" y="264" font-family="Arial,sans-serif" font-size="10" fill="#7f7f9a" letter-spacing="0.8">USERNAME</text>
  <rect x="160" y="272" width="360" height="42" rx="10" fill="#16161a" stroke="#2a2a32" stroke-width="1.5"/>
  <text x="196" y="298" font-family="Arial,sans-serif" font-size="13" fill="#7f7f9a">admin</text>
  <!-- user icon -->
  <circle cx="178" cy="290" r="6" stroke="#7f7f9a" stroke-width="1.2" fill="none"/>
  <path d="M170 302 q8-4 16 0" stroke="#7f7f9a" stroke-width="1.2" fill="none"/>

  <!-- Password label -->
  <text x="164" y="334" font-family="Arial,sans-serif" font-size="10" fill="#7f7f9a" letter-spacing="0.8">PASSWORD</text>
  <rect x="160" y="342" width="360" height="42" rx="10" fill="#16161a" stroke="#f0c040" stroke-width="1.5"/>
  <text x="196" y="368" font-family="Arial,sans-serif" font-size="13" fill="#7f7f9a">••••••••</text>
  <!-- lock icon -->
  <rect x="170" y="358" width="14" height="10" rx="2" stroke="#7f7f9a" stroke-width="1.2" fill="none"/>
  <path d="M173 358 v-3 a4 4 0 0 1 8 0 v3" stroke="#7f7f9a" stroke-width="1.2" fill="none"/>

  <!-- Sign In Button -->
  <rect x="160" y="400" width="360" height="44" rx="10" fill="#f0c040"/>
  <text x="340" y="428" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#0d0d0f" text-anchor="middle">Sign In</text>

  <!-- Hint -->
  <rect x="160" y="454" width="360" height="24" rx="8" fill="rgba(255,255,255,0.02)" stroke="#2a2a32" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="340" y="470" font-family="Arial,sans-serif" font-size="10" fill="#7f7f9a" text-anchor="middle">No account? Create one free — or use admin / quiz123</text>
</svg>
