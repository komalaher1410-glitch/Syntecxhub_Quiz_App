<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <defs>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f0c040"/><stop offset="100%" stop-color="#e05a5a"/></linearGradient>
  </defs>
  <!-- Background -->
  <rect width="680" height="580" fill="#0d0d0f"/>
  <rect width="680" height="580" fill="rgba(240,192,64,0.03)"/>

  <!-- Header -->
  <circle cx="40" cy="36" r="5" fill="#f0c040"/>
  <text x="54" y="43" font-family="Georgia,serif" font-size="22" font-weight="900" fill="#f0eff4">QuizMaster</text>
  <!-- User badge -->
  <circle cx="580" cy="36" r="14" fill="rgba(240,192,64,0.15)" stroke="rgba(240,192,64,0.3)" stroke-width="1"/>
  <text x="580" y="41" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#f0c040" text-anchor="middle">A</text>
  <text x="600" y="41" font-family="Arial,sans-serif" font-size="12" fill="#7f7f9a">admin</text>

  <!-- Card -->
  <rect x="28" y="68" width="624" height="494" rx="18" fill="#1c1c22" stroke="#2a2a32" stroke-width="1"/>
  <rect x="28" y="68" width="624" height="3" rx="2" fill="url(#bar3)"/>

  <!-- Trophy -->
  <text x="340" y="138" font-size="52" text-anchor="middle">🌟</text>

  <!-- Headline -->
  <text x="340" y="178" font-family="Georgia,serif" font-size="28" font-weight="900" fill="#f0eff4" text-anchor="middle">Well Done!</text>
  <text x="340" y="202" font-family="Arial,sans-serif" font-size="13" fill="#7f7f9a" text-anchor="middle">You answered 8 out of 10 questions correctly.</text>

  <!-- Score Ring -->
  <circle cx="340" cy="296" r="62" fill="none" stroke="#2a2a32" stroke-width="8"/>
  <!-- Ring fill ~80% = 310 of 390 circumference offset -->
  <circle cx="340" cy="296" r="62" fill="none" stroke="#f0c040" stroke-width="8" stroke-linecap="round"
    stroke-dasharray="389.6" stroke-dashoffset="77.9" transform="rotate(-90 340 296)"/>
  <text x="340" y="288" font-family="Georgia,serif" font-size="30" font-weight="900" fill="#f0c040" text-anchor="middle">80%</text>
  <text x="340" y="306" font-family="Arial,sans-serif" font-size="10" fill="#7f7f9a" text-anchor="middle" letter-spacing="0.5">SCORE</text>

  <!-- Stats -->
  <rect x="188" y="378" width="130" height="72" rx="12" fill="#16161a" stroke="#2a2a32" stroke-width="1"/>
  <text x="253" y="412" font-family="Georgia,serif" font-size="28" font-weight="600" fill="#4ade80" text-anchor="middle">8</text>
  <text x="253" y="432" font-family="Arial,sans-serif" font-size="10" fill="#7f7f9a" text-anchor="middle" letter-spacing="0.5">CORRECT</text>

  <rect x="362" y="378" width="130" height="72" rx="12" fill="#16161a" stroke="#2a2a32" stroke-width="1"/>
  <text x="427" y="412" font-family="Georgia,serif" font-size="28" font-weight="600" fill="#f87171" text-anchor="middle">2</text>
  <text x="427" y="432" font-family="Arial,sans-serif" font-size="10" fill="#7f7f9a" text-anchor="middle" letter-spacing="0.5">INCORRECT</text>

  <!-- Play Again Button -->
  <rect x="220" y="470" width="240" height="46" rx="23" fill="transparent" stroke="#2a2a32" stroke-width="1.5"/>
  <text x="340" y="499" font-family="Arial,sans-serif" font-size="13" font-weight="500" fill="#f0eff4" text-anchor="middle">↺  Play Again</text>
</svg>
