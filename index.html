<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizMaster</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrapper">

  <div class="brand">
    <div class="brand-dot"></div>
    <div class="brand-title">QuizMaster</div>
    <div class="user-badge" id="userBadge" style="display:none">
      <div class="user-avatar" id="userAvatar"></div>
      <span id="userNameDisplay"></span>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
  </div>

  <div id="loginScreen">
    <div class="card">
      <div class="login-hero">
        <div class="login-icon">&#x1F9E0;</div>
        <div class="login-title" id="authTitle">Welcome Back</div>
        <div class="login-sub" id="authSub">Sign in to start the quiz.</div>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Create Account</button>
      </div>
      <div class="login-form">
        <div class="field-group" id="fieldDisplayName" style="display:none">
          <label class="field-label" for="inputDisplayName">Display Name</label>
          <div class="field-wrap">
            <span class="field-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 12c0-2 1.5-3 4-3.5M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM10 9c2.5.5 4 1.5 4 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
            <input class="field-input" id="inputDisplayName" type="text" placeholder="Your name (optional)" autocomplete="name" />
          </div>
        </div>
        <div class="field-group">
          <label class="field-label" for="inputUser">Username</label>
          <div class="field-wrap">
            <span class="field-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M2 13c0-2.5 2.7-4 6-4s6 1.5 6 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
            <input class="field-input" id="inputUser" type="text" placeholder="Enter username" autocomplete="username" />
          </div>
        </div>
        <div class="field-group">
          <label class="field-label" for="inputPass">Password</label>
          <div class="field-wrap">
            <span class="field-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 7V5a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
            <input class="field-input" id="inputPass" type="password" placeholder="Enter password" autocomplete="current-password" />
            <button class="toggle-pw" type="button" onclick="togglePassword()" title="Show/hide password">
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
          </div>
        </div>
        <div class="field-group" id="fieldConfirmPass" style="display:none">
          <label class="field-label" for="inputConfirmPass">Confirm Password</label>
          <div class="field-wrap">
            <span class="field-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 7V5a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
            <input class="field-input" id="inputConfirmPass" type="password" placeholder="Repeat password" autocomplete="new-password" />
          </div>
        </div>
        <div class="login-error" id="loginError">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M7 4v3.5M7 9.5v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          <span id="loginErrorMsg">Invalid username or password.</span>
        </div>
        <div class="login-success" id="loginSuccess">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M4.5 7l2 2 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span id="loginSuccessMsg">Account created!</span>
        </div>
        <button class="btn-login" id="btnLogin" onclick="handleAuth()">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M6 2H3a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h3M10 10.5l3-3-3-3M13 7.5H5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span id="btnLoginText">Sign In</span>
        </button>
      </div>
      <div class="login-hint" id="loginHint">
        No account? <strong style="cursor:pointer;text-decoration:underline" onclick="switchTab('signup')">Create one free</strong>
        &mdash; or use <strong>admin</strong> / <strong>quiz123</strong>
      </div>
    </div>
  </div>

  <div id="quizArea" style="display:none">
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">1 / 10</div>
    </div>
    <div class="card fade-in" id="mainCard"></div>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
